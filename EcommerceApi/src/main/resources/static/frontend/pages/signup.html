<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Judella Store</title>
    <link rel="stylesheet" href="/frontend/css/index.css">
</head>
<body>

    <div class="main-content">
        <div class="account-info" style="max-width: 500px; margin: auto;">
            <h1>Create an Account</h1>
            <form>
                <label>Full Name</label>
                <input type="text" required placeholder="Enter your name">

                <label>Email Address</label>
                <input type="email" required placeholder="example@email.com">

                <label>Password</label>
                <input type="password" required placeholder="Create password">

                <label>Confirm Password</label>
                <input type="password" required placeholder="Confirm password">

                <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="/frontend/js/index.js"></script>
</body>
</html>
